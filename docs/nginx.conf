# Ristorante Il Girasole — Nginx Configuration
# Copia in C:\nginx\conf\nginx.conf (Windows)
#                    /etc/nginx/nginx.conf (Linux)

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Compressione
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    server {
        listen       80;
        server_name  localhost;

        root   C:\nginx\html\risto;   # Windows
        # root /var/www/risto;        # Linux
        index  index.html;

        # ============================================
        # PWA — Manifest MIME type
        # ============================================
        location ~* \.webmanifest$ {
            types { application/manifest+json webmanifest; }
        }

        # ============================================
        # PWA — Service Worker (NO cache!)
        # ============================================
        location /sw.js {
            add_header Cache-Control "no-cache";
        }
        location /registerSW.js {
            add_header Cache-Control "no-cache";
        }
        location /workbox- {
            add_header Cache-Control "no-cache";
        }
        location ~* \.js$ {
            add_header Cache-Control "no-cache";
        }

        # ============================================
        # SPA — tutte le route vanno a index.html
        # ============================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================
        # Proxy per Supabase API locale (Kong)
        # ============================================
        location /rest/ {
            proxy_pass http://127.0.0.1:8000/rest/;
            proxy_set_header Host $host;
        }

        location /auth/ {
            proxy_pass http://127.0.0.1:8000/auth/;
            proxy_set_header Host $host;
        }

        # ============================================
        # Proxy per Print Agent
        # ============================================
        location /print-agent/ {
            rewrite ^/print-agent/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8787;
            proxy_set_header Host $host;
        }
    }
}
