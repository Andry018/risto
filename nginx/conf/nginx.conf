# Ristorante Il Girasole — Nginx Configuration (unified)
# Copia in C:\nginx\conf\nginx.conf (Windows)
#                    /etc/nginx/nginx.conf (Linux)

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compressione Gzip per caricare i menu sui tablet all'istante
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # MIME type corretto per PWA Web Manifest
    types {
        application/manifest+json webmanifest;
    }

    server {
        listen       80;
        server_name  localhost;

        # ============================================
        # FRONTEND — File statici generati da Vite Build
        # ============================================
        root   C:/risto/asporto-app/dist;   # Windows
        # root /var/www/risto;               # Linux
        index  index.html;

        # ============================================
        # PWA — Service Worker (NO cache!)
        # ============================================
        location /sw.js          { add_header Cache-Control "no-cache"; }
        location /registerSW.js  { add_header Cache-Control "no-cache"; }
        location ~* \.js$        { add_header Cache-Control "no-cache"; }

        # ============================================
        # SPA — tutte le route vanno a index.html
        # ============================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================
        # SUPABASE — API, Auth, Storage (+ CORS mobile)
        # ============================================
        
        location /rest/ {
            proxy_pass http://127.0.0.1:54321/rest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        location /auth/ {
            proxy_pass http://127.0.0.1:54321/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        location /storage/ {
            proxy_pass http://127.0.0.1:54321/storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # ============================================
        # SUPABASE — Realtime WebSocket
        # ============================================
        location /realtime/ {
            proxy_pass http://127.0.0.1:54321/realtime/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================
        # PRINT AGENT — stampa termica
        # ============================================
        location /print-agent/ {
            rewrite ^/print-agent/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8787;
            proxy_set_header Host $host;
        }

        # ============================================
        # ADMIN DASHBOARD — controlli server locale
        # ============================================
        location /supabase-start { proxy_pass http://127.0.0.1:4000/supabase-start; }
        location /supabase-stop  { proxy_pass http://127.0.0.1:4000/supabase-stop; }
        location /print-restart  { proxy_pass http://127.0.0.1:4000/print-restart; }
        location /git-pull       { proxy_pass http://127.0.0.1:4000/git-pull; }

        # ============================================
        # PAGINE DI ERRORE
        # ============================================
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
